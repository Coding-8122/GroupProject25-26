name: RecoveryTracker CI

on:
  push:
    branches: [ develop, main, "feature/*", "infrastructure/*" ]
  pull_request:
    branches: [ develop, main ]

# Concurrency group to cancel previous runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Define environment variables at the job level so both the app and the DB service can use them
    env:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: recovery_test
      DATABASE_URL: "postgresql://user:password@localhost:5432/recovery_test"
      SECRET_KEY: "test-key-for-ci"

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install uv - modern, lightning-fast Python package manager
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # Set up Python 3.13 using uv's integration
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        # Syncs the environment strictly with the lockfile
        run: uv sync --all-extras --dev

      - name: Run migrations (Optional but recommended)
        # run: uv run flask db upgrade
        run: echo "Skipping migrations for now"

      - name: Run tests
        run: |
          uv run pytest tests/ --maxfail=1 --disable-warnings
