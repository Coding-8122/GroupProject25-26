{% extends "layout.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<h1>Dashboard</h1>

<section class="card">
  <h2>Chart: muscle volume</h2>

  <div class="chart-container">
    <canvas id="muscleVolumeChart"></canvas>
  </div>

  <p class="muted" id="muscleNoData">No data yet.</p>
</section>

<section class="card">
  <h2>Weekly training volume</h2>

  <div class="chart-container">
    <canvas id="weeklyTrainingVolumeChart"></canvas>
  </div>

  <p class="muted" id="weeklyTrainingVolumeNoData">No data yet.</p>
</section>

{% endblock %}

{% block scripts %}
<script>
  if (typeof renderMuscleVolume === "function") renderMuscleVolume();
  if (typeof renderWeeklyTrainingVolume === "function") renderWeeklyTrainingVolume();
</script>
{% endblock %}
