services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-recovery_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-recovery_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Security: Do NOT expose DB port to host network in production.
    # Uncomment below only for local development debugging:
    # ports:
    #   - "127.0.0.1:5432:5432"
    # Security: Prevent privilege escalation
    security_opt:
      - no-new-privileges:true
    # Security: Read-only root filesystem where possible
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-recovery_db}
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=0
    depends_on:
      db:
        condition: service_healthy
    # Security: Prevent privilege escalation in container
    security_opt:
      - no-new-privileges:true
    # Security: Read-only root filesystem
    read_only: true
    tmpfs:
      - /tmp

volumes:
  postgres_data: